# ============================================
# PHASE 1: Fix Critical Technical Issues
# Timeline: Week 1-2
# Impact: Stop bleeding rankings to wrong pages
# ============================================

phase_1:
  name: Fix Critical Technical Issues
  timeline: Week 1-2
  priority: IMMEDIATE
  goal: Fix cannibalization, old URLs, and canonical issues

  tasks:

    # --- 1.1 Keyword Cannibalization Fix ---
    - id: 1.1.1
      task: Audit /about-us page for bathroom-related content
      type: code_review
      file: app/about-us/page.tsx
      detail: >
        Find all mentions of "bathroom", "remodeling", "renovation" on the
        about-us page that are causing Google to rank it for
        "bathroom remodeling escondido" instead of /bathroom-remodeling.
      status: todo

    - id: 1.1.2
      task: Remove or reduce bathroom service content from /about-us
      type: code_change
      file: app/about-us/page.tsx
      detail: >
        Remove or significantly reduce bathroom remodeling mentions on
        about-us page so Google stops associating it with bathroom keywords.
        Keep only a brief general mention if needed.
      depends_on: [1.1.1]
      status: todo

    - id: 1.1.3
      task: Optimize /bathroom-remodeling page for target keywords
      type: code_change
      file: app/bathroom-remodeling/page.tsx
      detail: >
        Ensure the page has:
        - Title tag: "Bathroom Remodeling Escondido | BNC Builders Inc."
        - H1 includes "bathroom remodeling" + "Escondido"
        - Meta description (150-160 chars) with primary keyword
        - Strong opening paragraph with "bathroom remodeling escondido"
        - ServiceJsonLd schema for bathroom remodeling
      status: todo

    - id: 1.1.4
      task: Add internal links to /bathroom-remodeling from key pages
      type: code_change
      files:
        - app/page.tsx
        - app/home-remodeling/page.tsx
        - app/kitchen-remodeling/page.tsx
        - components that render service links
      detail: >
        Add 3-5 internal links from high-authority pages pointing to
        /bathroom-remodeling with anchor text variations:
        - "bathroom remodeling"
        - "Escondido bathroom remodeling"
        - "bathroom renovation services"
      depends_on: [1.1.3]
      status: todo

    # --- 1.2 Old URL Indexing Cleanup ---
    - id: 1.2.1
      task: Verify 301 redirects are working for old URLs
      type: verification
      detail: >
        Test these old URLs return proper 301 -> new URL:
        - /home-remodeling/kitchen-remodeling/ -> /kitchen-remodeling
        - /exterior-remodeling/3d-landscape-design/ -> /3d-landscape-design
        Use curl -I to verify status codes and redirect targets.
      status: todo

    - id: 1.2.2
      task: Scan codebase for internal links to old URL paths
      type: code_review
      detail: >
        Search all components, pages, and data files for any links still
        pointing to old URL structure:
        - /home-remodeling/kitchen-remodeling
        - /home-remodeling/bathroom-remodeling
        - /exterior-remodeling/3d-landscape-design
        - /exterior-remodeling/* (any old nested paths)
        Update any found to use new flat URL structure.
      status: todo

    - id: 1.2.3
      task: Request URL removal in Google Search Console
      type: manual
      detail: >
        In GSC -> Removals -> New Request:
        - Remove: www.bncbuildersinc.com/home-remodeling/kitchen-remodeling/
        - Remove: www.bncbuildersinc.com/exterior-remodeling/3d-landscape-design/
        Also submit updated sitemap.xml.
      depends_on: [1.2.1]
      status: todo

    # --- 1.3 Kitchen Page Consolidation ---
    - id: 1.3.1
      task: Verify /home-remodeling/kitchen-remodeling/ 301 passes link equity
      type: verification
      file: next.config.ts
      detail: >
        Confirm redirect rule uses permanent: true (301, not 302).
        Check that the redirect target matches the canonical URL exactly.
      status: todo

    - id: 1.3.2
      task: Request re-crawl of /kitchen-remodeling in GSC
      type: manual
      detail: >
        In GSC -> URL Inspection -> enter www.bncbuildersinc.com/kitchen-remodeling
        -> Request Indexing. This prompts Google to re-evaluate and consolidate.
      depends_on: [1.3.1]
      status: todo

    # --- 1.4 www vs non-www Fix ---
    - id: 1.4.1
      task: Decide canonical domain (www vs non-www)
      type: decision
      detail: >
        Current state: some pages indexed as bncbuildersinc.com, others as
        www.bncbuildersinc.com. Need to pick ONE and enforce it.
        Recommendation: Use www.bncbuildersinc.com (already used by most pages).
      status: todo

    - id: 1.4.2
      task: Ensure NEXT_PUBLIC_SITE_URL uses canonical domain
      type: code_change
      file: .env / .env.production
      detail: >
        Set NEXT_PUBLIC_SITE_URL=https://www.bncbuildersinc.com
        (with www). This drives canonical URLs, sitemap, and OG tags.
      depends_on: [1.4.1]
      status: todo

    - id: 1.4.3
      task: Add non-www to www redirect in next.config.ts or hosting
      type: code_change
      file: next.config.ts (or Vercel config)
      detail: >
        Ensure all requests to bncbuildersinc.com (no www) 301 redirect
        to www.bncbuildersinc.com. Check if Vercel handles this or if
        we need a middleware redirect.
      depends_on: [1.4.1]
      status: todo

    - id: 1.4.4
      task: Verify all canonical tags output www version
      type: verification
      file: lib/utils/metadata.ts
      detail: >
        Check generatePageMetadata() outputs canonical URLs with www prefix.
        Spot-check 5 pages to confirm <link rel="canonical"> is correct.
      status: todo


